<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>map-export</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .mapdiv {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .fineLine {
      position: relative;
      width: calc(100% - 30px);
      height: calc(100% - 30px);
      top: 15px;
      left: 15px;
    }

    .fineLine::before {
      border: 5px solid #000;
      position: fixed;
      width: calc(100% - 10px);
      height: calc(100% - 10px);
      content: '';
      top: 0;
      left: 0;
    }

    .thickLine {
      position: relative;
      width: calc(100% - 40px);
      height: calc(100% - 40px);
      top: 20px;
      left: 20px;
    }

    .thickLine::before {
      border: 10px solid #000;
      position: fixed;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      content: '';
      top: 0;
      left: 0;
    }

    .dualLine {
      border: 5px solid #000;
      position: relative;
      width: calc(100% - 50px);
      height: calc(100% - 50px);
      top: 20px;
      left: 20px;
    }

    .dualLine::before {
      border: 10px solid #000;
      position: fixed;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      content: '';
      top: 0;
      left: 0;
    }

    .svgContainer {
      position: absolute;
      z-index: 100;
      width: 500px;
      height: 500px;
      left: 0px;
      top: 0px;
      overflow: visible;
    }

    #Text_Layer g>text:not(.txtLinkerClick) {
      fill: rgb(0, 0, 0) !important;
      font-weight: bold;
    }

    polygon,
    rect,
    circle,
    path,
    polyline {
      vector-effect: non-scaling-stroke;
    }

    symbol rect,
    symbol line,
    symbol polyline,
    symbol polygon,
    symbol circle,
    symbol ellipse,
    symbol path {
      vector-effect: non-scaling-stroke;
      stroke-width: 1;
    }

    polyline {
      stroke-width: 1.5;
    }

    .blodStroke {
      /* 主干线路加粗css */
      stroke-width: 3.5;
    }

    #Substation_Layer polygon {
      stroke-width: 1;
    }

    polyline[stroke-width='1.2'] {
      stroke-width: 3.5;
      /*stroke: green;*/
    }

    #BusbarSection_Layer polyline {
      stroke-width: 3;
    }

    svg.overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>

    async function mapcallback(m) {
      map = m
      window.nariNewMap = map
      let dkxid = params.id
      let qst = params.starttime
      let qet = params.endtime
      let titlename = params.titlename
      let flysb = params.flysb
      let locatpsrid = params.locatpsrid
      let szpsrid = params._szpsrid
      let source = params.type
      let svgid = params.svgId
      if (locatpsrid) {
        const r = await fetch(
          'http://25.213.110.169:18055/tmzx/admin-api/tmzx/szdwsvg/preview/getSvgGidByPsrid',
          {
            method: 'POST',
            headers: {
              Authorization: 'Bearer ' + accessToken,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              dkxid: dkxid,
              locatpsrid: locatpsrid
            })
          }
        )
        const { code, data: res } = await r.json()

        if (code === 200 && res) {
          flysb = res
          svgView = new SvgView(accessToken, dkxid, qst, qet, titlename, flysb, szpsrid)
          svgView.setExportConfigValue(exportConfig)
          if (source && source == 'tm') {
            svgView.renderOuterSvgOnMap(map, svgid, source)
          } else {
            svgView.renderSvgOnMap(map)
          }
        }
      } else {
        svgView = new SvgView(accessToken, dkxid, qst, qet, titlename, flysb)
        svgView.setExportConfigValue(exportConfig)
        if (source && source == 'tm') {
          svgView.renderOuterSvgOnMap(map, svgid, source)
        } else {
          svgView.renderSvgOnMap(map)
        }
      }
      window.svgView = svgView

    }

    async function initMap(config) {
      return new Promise(async (resolve, reject) => {
        // 初始化地图
        nariMapIniter = new NariMapIniter(map)
        await nariMapIniter.go(mapcallback)
        resolve({
          accessToken,
          map,
          svgView,
          nariMapIniter,
          params
        })
      })
    }
    // 等待地图加载完成
    const waitLoaded = (window) => {
      return new Promise((resolve) => {
        const timer = setInterval(() => {
          if (window.svgView && window.svgView.get$BusValue("initPrintInfo")) {
            clearInterval(timer)
            resolve()
          }
        }, 10)
      });
    }

    async function initSvg(config) {
      return new Promise(async (resolve, reject) => {
        let dkxid = params.id
        let qst = params.starttime
        let qet = params.endtime
        let flysb = params.flysb
        let locatpsrid = params.locatpsrid
        let szpsrid = params._szpsrid
        let source = params.type
        let svgid = params.svgId
        let attid = params.attid

        if (locatpsrid) {
          const r = await fetch(
            'http://25.213.110.169:18055/tmzx/admin-api/tmzx/szdwsvg/preview/getSvgGidByPsrid',
            {
              method: 'POST',
              headers: {
                Authorization: 'Bearer ' + accessToken,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                dkxid: dkxid,
                locatpsrid: locatpsrid
              })
            }
          )
          const { code, data: res } = await r.json()
          if (code === 200 && res) {
            flysb = res
          }
          svgView = new SvgView(accessToken, dkxid, qst, qet, flysb, szpsrid)
          svgView.setExportConfigValue(config)
          if (source && source == 'lg') {
            svgView.renderOutSvg(svgid, source)
          } else {
            svgView.renderSvg()
          }
        } else {
          if (attid) {
            const r = await fetch(
              'http://25.213.110.169:18055/tmzx/admin-api/tmzx/szdwsvg/preview/getOuterSvgIdByAttid',
              {
                method: 'POST',
                headers: {
                  Authorization: 'Bearer ' + accessToken,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  attid: attid
                })
              }
            )
            const { code, data: res } = await r.json()
            if (code === 200 && res) {
              svgid = res
              svgView = new SvgView(accessToken, dkxid, qst, qet, flysb, szpsrid)
              svgView.setExportConfigValue(config)
              if (source && source == 'lg') {
                svgView.renderOutSvg(svgid, source)
              } else {
                svgView.renderSvg()
              }
            }
          } else {
            svgView = new SvgView(accessToken, dkxid, qst, qet, flysb, szpsrid)
            if (source && source == 'lg') {
              svgView.renderOutSvg(svgid, source)
            } else {
              svgView.renderSvg()
            }
          }
        }
        window.svgView = svgView
        resolve({
          accessToken,
          svgView,
          params
        })
      })
    }

    const renderInit = async (config) => {
      console.log('【 config 】', config);
      const { isMap = true, routerQuery, accessToken: token, borderStyle, background = 'rgba(0,0,0,0)', paperMM, dpi } = config
      exportConfig = config
      accessToken = token
      params = routerQuery
      const renderFun = isMap ? initMap : initSvg

      container.style.display = 'block'
      container.style.backgroundColor = background
      // 设置边框
      svgMapAccessories.newDrawMapBorder(container, borderStyle)
      const res = await renderFun(config)
      await waitLoaded(window)
      if(!isMap){
        const svgEl = document.querySelector('#svgContainer svg svg')
        svgMapAccessories.adjustSvg(svgEl)
      }
      document.title = svgView.dkxName
      // 获取图纸信息数据
      const { dobj } = svgView.get$BusValue("initPrintInfo")
      const { tableData, tableMerges } = svgMapAccessories.returnTableInfo(dobj)
      /** 绘制标题/图例/比例尺 */
      const accCanvas = await svgMapAccessories.drawMapDecorations({ ...config, tableData, tableMerges })
      accCanvas.style = 'position: absolute;left:0;top:0;z-index:99'
      container.appendChild(accCanvas)
      return res
    }
